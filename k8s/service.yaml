apiVersion: v1
kind: Service
metadata:
  name: nhs-backend-service
spec:
  type: LoadBalancer
  selector:
    app: nhs-backend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
spec:
  clusterIP: None
  selector:
    app: redis
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379
