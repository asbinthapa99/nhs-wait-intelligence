name: Daily Data Refresh

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      HAS_SMTP: ${{ secrets.SMTP_HOST != '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      - name: Install pipeline dependencies
        working-directory: pipeline
        run: pip install -r requirements.txt

      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.DATABASE_URL }}" ]; then
            echo "::error::DATABASE_URL secret is not configured."
            echo "::error::Go to repo Settings → Secrets and variables → Actions and add DATABASE_URL."
            exit 1
          fi
          echo "DATABASE_URL secret is present."

      - name: Run daily pipeline refresh
        working-directory: pipeline
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python run_pipeline.py

      - name: Pipeline summary
        if: success()
        run: |
          echo "### Pipeline completed successfully" >> $GITHUB_STEP_SUMMARY
          echo "- Run: ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- Triggered: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

      - name: Create or update failure issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const label = 'automation-failure';
            const title = '[Automation] Daily data refresh failed';
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;
            const body = [
              `Daily refresh failed on ${new Date().toISOString()}.`,
              '',
              `- Workflow: ${context.workflow}`,
              `- Run: ${runUrl}`,
              `- Commit: ${context.sha}`,
              '',
              'Please review logs and resolve before next scheduled run.'
            ].join('\n');

            const existing = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: 'open',
              labels: label,
              per_page: 100,
            });

            const match = existing.find((issue) => issue.title === title);

            if (match) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: match.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels: [label],
              });
            }

      - name: Send email on failure (optional)
        if: failure() && env.HAS_SMTP == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "[NHS Intelligence] Daily pipeline refresh failed"
          body: "The daily NHS Intelligence data refresh failed. Check logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          to: ${{ secrets.ALERT_EMAIL }}
          from: GitHub Actions Pipeline Bot
